<script src="">
  function add() {
    var t = 0;
    for (var i = 1; i < 11; i++) {
      t += i;
    }
    return t;
  }
  console.log(add());
</script>

<script src="">
  function add(num) {
    if (num <= 0) {
      return 0;
    }
    return num + add(num - 1);
  }
  console.log(add(10));
</script>

<script src="">
  function add(num, start = 0) {
    if (start >= num) {
      return 0;
    }
    const next = start + 1;
    return start + add(num, next);
  }
  console.log(add(11));
</script>

<script src="">
  function add(num, start = 0) {
    if (start >= num) {
      return 0;
    }
    const next = start + 1;
    return console.log(55555), start + add(num, next);
  }
  console.log(add(11));

<script src="">
  var sum = 0;
  for (let i = 0; i <= 100; i++) {
    if (i % 2 === 0 && i % 3 === 0) {
      sum = sum + i;
    }
  }
  console.log(sum);

  function sumFunction(min, max) {
    let sum = 0;
    for (let i = 0; i <= max; i++) {
      if (i % 2 === 0 && i % 3 === 0) {
        sum = sum + i;
      }
    }
    return sum;
  }
  console.log(sumFunction(1, 100));

  function recursion(min = 0, max = 100) {
    if (min > max) {
      return 0;
    }

    if (min % 2 === 0 && min % 3 === 0) {
      return min + recursion(min + 1);
    }

    return 0 + recursion(min + 1);
  }
  console.log(recursion(1));
</script>
