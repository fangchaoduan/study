<script>
  const array = [4, 3, 2, 1];
  const bubbleSort = (array = []) => {
    for (let i = 0; i < array.length - 1; i++) {
      for (let j = 0; j < array.length - 1 - i; j++) {
        if (array[j] > array[j + 1]) {
          const max = array[j];
          array[j] = array[j + 1];
          array[j + 1] = max;
        }
        console.log(`i:${i}-j:${j} = ${array}`);
      }

      console.log(`第${i + 1}外轮 = ${array}`);
    }
    return array;
  };
  console.log(bubbleSort(array));
</script>
