<script src="">
  const ary = [5, 4, 3, 2, 1];
  function quicksort(array = []) {
    //停止递归的条件 - 入参数组里面只有1项或者0项，就停止
    if (array.length <= 1) {
      return array;
    }

    //1 拿出中间项，并且删除那一项
    const centerIndex = Math.floor(array.length / 2); //中间项下标
    const centerItem = array.splice(centerIndex, 1)[0]; //中间项数值

    //2 创建两个空数组，遍历剩余数组中每一项如果比中间项数值大，那就放右边，比中间项数值小放左边
    const minArray = [];
    const maxArray = [];
    for (let i = 0; i < array.length; i++) {
      const nowItem = array[i];
      if (nowItem < centerItem) {
        minArray.push(nowItem);
      } else {
        maxArray.push(nowItem);
      }
    }
    return quicksort(minArray).concat(centerItem, quicksort(maxArray));
  }
  console.log(quicksort(ary));
</script>
<script src="">
  var ary = [5, 4, 3, 2, 1];
  function quickSort(ary) {
    // 停止递归的条件
    // 数组里面只有一项或者0项，就停止
    if (ary.length <= 1) return ary;
    // @1 拿出中间项，并且删除那一项
    var midIndex = Math.floor(ary.length / 2); //中间项下标
    var midItem = ary.splice(midIndex, 1)[0]; //中间项
    // @2 创建两个空数组，如果比中间项大，那就放右边，比中间项小放左边
    var leftAry = [],
      rightAry = [];
    for (var i = 0; i < ary.length; i++) {
      if (ary[i] > midItem) {
        rightAry.push(ary[i]);
      } else {
        leftAry.push(ary[i]);
      }
    }
    return quickSort(leftAry).concat(midItem, quickSort(rightAry));
  }
  console.log(quickSort(ary));
</script>
<script src="">
  var array = [5, 6, 3, 2, 4, 1, 9];
  function quicksort(ary = []) {
    if (ary.length <= 1) {
      return ary;
    }

    const index = Math.floor(ary.length / 2);
    const center = ary.splice(index, 1);
    const min = [];
    const max = [];
    for (let i = 0; i < ary.length; i++) {
      if (ary[i] > center) {
        max.push(ary[i]);
        continue;
      }
      min.push(ary[i]);
    }
    return quicksort(min).concat(center, quicksort(max));
  }
  console.log(quicksort(array));
</script>
