<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>复习</title>
    <style>
      .box {
        width: 500px;
        margin: 50px auto;
        color: red;
        line-height: 100px;
        text-align: center;
        font-size: 20px;
        cursor: pointer;
        user-select: none;
        border: 10px solid skyblue;
      }
    </style>
  </head>
  <body>
    <div class="box"></div>
  </body>
</html>

<script>
  const countDown = () => {
    const now = new Date();
    const next = new Date("2024/02/10 00:00:00");
    const diffTime = next - now;

    const day = Math.floor(diffTime / (1000 * 60 * 60 * 24));
    const hours = Math.floor(
      (diffTime - 1000 * 60 * 60 * 24 * day) / (1000 * 60 * 60)
    );
    const minutes = Math.floor(
      (diffTime - 1000 * 60 * 60 * 24 * day - 1000 * 60 * 60 * hours) /
        (1000 * 60)
    );
    const seconds = Math.floor(
      (diffTime -
        1000 * 60 * 60 * 24 * day -
        1000 * 60 * 60 * hours -
        1000 * 60 * minutes) /
        1000
    );
    // console.log(day);
    const res = `距离2024年春节还有${day}天${hours}小时${minutes}分钟${seconds}秒`;
    return res;
  };

  const box = document.getElementsByClassName("box")[0];
  box.innerHTML = countDown();
  setInterval(() => {
    box.innerHTML = countDown();
  }, 1000);
</script>
