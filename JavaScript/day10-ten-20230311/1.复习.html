  function map(theArray = [], callback = () => {}) {
    const res = [];
    for (let i = 0; i < theArray.length; i++) {
      const item = theArray[i];
      const index = i;
      const selfArray = theArray;
      const callbackReturn = callback(item, index, selfArray);
      res[res.length] = callbackReturn;
    }
    return res;

<script src="">
  var objectDeweight = (ary = []) => {
    const obj = Object.create(null);
    for (let i = 0; i < ary.length; i++) {
      if (ary[i] in obj) {
        ary[i] = ary[ary.length - 1];
        ary.length--;
        i--;
        continue;
      }

      obj[ary[i]] = i;
    }
    return ary;
  };
  console.log(objectDeweight([6, 0, 1, 2, 3, undefined, null, 6, 5, 5, 1, 1]));
</script>
<script>
  var objectDeweight = (ary = []) => {
    const obj = Object.create(null);
    for (let i = 0; i < ary.length; i++) {
      if (obj[ary[i]] !== undefined) {
        ary[i] = ary[ary.length - 1];
        ary.length--;
        i--;
        continue;
      }

      obj[ary[i]] = i;
    }
    return ary;
  };
  console.log(objectDeweight([6, 0, 1, 2, 3, undefined, null, 6, 5, 5, 1, 1]));
</script>
