<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

  <body></body>
  <script src="">
    for (var i = 0; i < 10; i++) {
      if (i < 5) {
        // 0 2 4
        i++; //0->1; 2->3; 4 -> 5
        continue;
      }
      if (i > 7) {
        //8
        i += 2; //8 -> 10
        break;
      }
      i += 1; // 6 -> 7
    }
    console.log(i); //10
  </script>
  <script>
    for (var i = 1; i <= 10; i += 2) {
      if (i <= 5) {
        //1 4 7
        i++; //1->2 4->5
        continue;
      } else {
        i -= 2; //7 -> 5
        break;
      }
      i--;
      console.log(i);
    }
    console.log(i); //5

    var num = 3;
    //     3  +     3 +     2 +    2 +      3   //13
    num = num++ + --num + --num + num++ + num++;
    console.log(num);
  </script>
</html>
