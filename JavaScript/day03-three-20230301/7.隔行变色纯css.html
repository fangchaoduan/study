<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Document</title>
  <style>
    ul{
      width: 800px;
      margin: 50px auto;
    }
    ul>li{
      /* display: inline-block; */
      width: 200px;
      /* height: 200px; */
      border: 1px solid gray;
    }

    li:nth-child(3n){
      background-color: skyblue;
    }
    li:nth-child(3n+1){
      background-color: pink;
    }
    li:nth-child(3n+2){
      background-color: yellow;
    }

  </style>
</head>
<body>
  <ul>
    <li>šČČ1item</li>
    <li>šČČ2item</li>
    <li>šČČ3item</li>
    <li>šČČ4item</li>
    <li>šČČ5item</li>
    <li>šČČ6item</li>
    <li>šČČ7item</li>
    <li>šČČ8item</li>
    <li>šČČ9item</li>
    <li>šČČ10item</li>
  </ul>
</body>
</html>
