    const getNumber = function () {
      const result = {
        min: arguments[0],

        total: arguments[0],
        length: arguments.length,
        average: arguments[0],
      };
      for (let i = 1; i < result.length; i++) {
        result.total += arguments[i];

          result.min = arguments[i];
        }
        if (result.max <= arguments[i]) {
          result.max = arguments[i];
        }
      }
      if (result.total) {
        result.average = result.total / result.length;
      }
      return result;
    };
