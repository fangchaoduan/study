<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Document</title>
    <style>
      .outer {
        width: 100vw;
        height: 100vh;
        box-sizing: border-box;
        border: 1px solid rgb(255, 255, 0);

        position: relative;
      }

      .inner1 {
        width: 200px;
        height: 100%;
        background-color: aqua;

        /* position: absolute;
        top: 0;
        bottom: 0; */
      }
      .inner2 {
        height: 100%;
        background-color: blue;

        position: absolute;
        top: 0;
        bottom: 0;
        left: 200px;
        right: 0;
        margin: auto 0px;
      }
    </style>
  </head>
  <body>
    <div class="outer">
      <div class="inner1">1111</div>
      <div class="inner2">
        <div style="width: 200px; height: 100px; background-color: pink">
          222
        </div>
      </div>
    </div>
  </body>
</html>
