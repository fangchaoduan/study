<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .outer {
        width: 100vw;
        height: 100vh;
        box-sizing: border-box;
        border: 1px solid rgb(255, 255, 0);

        /*  //1. flex布局。
        display: flex; */
      }

      .inner1 {
        width: 200px;
        height: 100%;
        background-color: aqua;

        /* float: left; */

        float: left;
      }
      .inner2 {
        height: 100%;

        background-color: blue;

        /* //1. flex布局。
        //flex: 1;
        //flex-shrink: 1;
        flex-grow: 1; */

        /*  //2. 浮动与BFC。
        overflow: hidden; */
        display:flex;


        /*  //3. 浮动与横向格式化属性margin-left。
        width: auto;
        margin-left: 200px; */
      }
    </style>
  </head>
  <body>
    <div class="outer">
      <div class="inner1">1111</div>
      <div class="inner2">
        <div style="width: 200px; height: 100px; background-color: pink">
          222
        </div>
      </div>
    </div>
  </body>
</html>
