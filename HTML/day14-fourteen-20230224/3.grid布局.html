<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .grid-box1 {
        width: 600px;
        height: 200px;

        display: grid;
        grid-template-columns: repeat(6, 1fr);
        grid-template-rows: repeat(2, 1fr);
      }
      .grid-item1 {
        border: 1px solid red;
      }
      .grid-item1:nth-child(1) {
        grid-column-start: 1;
        grid-column-end: 3;
      }
      .grid-item1:nth-child(2) {
        grid-column-start: 3;
        grid-column-end: 5;
      }

      /* .grid-box2 {
        width: 600px;
        height: 200px;

        display: grid;
        grid-template-columns: repeat(5, 1fr);
        grid-template-rows: 2fr repeat(2, 1fr);
      }
      .grid-item2 {
        border: 1px solid red;
      }
      .grid-item2:nth-child(1),
      .grid-item2:nth-child(2),
      .grid-item2:nth-child(3),
      .grid-item2:nth-child(4) {
        grid-row-start: 2;
        grid-row-end: 4;
      } */
      .grid-box2 {
        width: 600px;
        height: 200px;

        display: grid;
        grid-template-columns: repeat(5, 1fr);
        grid-template-rows: repeat(4, 1fr);
      }
      .grid-item2 {
        border: 1px solid red;
      }
      .grid-item2:nth-child(1),
      .grid-item2:nth-child(2),
      .grid-item2:nth-child(3),
      .grid-item2:nth-child(4),
      .grid-item2:nth-child(5) {
        grid-row-start: 1;
        grid-row-end: 3;
      }
      .grid-item2:nth-child(6),
      .grid-item2:nth-child(7),
      .grid-item2:nth-child(8),
      .grid-item2:nth-child(9) {
        grid-row-start: 3;
        grid-row-end: 5;
      }

      /* ----------------- */
      .grid-box3 {
        width: 600px;
        height: 300px;

        display: grid;
        grid-template-columns: repeat(20, 1fr);
        grid-template-rows: repeat(3, 1fr);
      }
      .grid-item3 {
        border: 1px solid red;
      }
      .grid-item3:nth-child(1),
      .grid-item3:nth-child(2) {
        grid-column-start: 1;
        grid-column-end: 5;
      }
      .grid-item3:nth-child(1) {
        grid-row-start: 1;
        grid-row-end: 2;
      }
      .grid-item3:nth-child(2) {
        grid-row-start: 2;
        grid-row-end: 3;
      }
      .grid-item3:nth-child(3) {
        grid-column-start: 5;
        grid-column-end: 12;
        grid-row-start: 1;
        grid-row-end: 3;
      }
      .grid-item3:nth-child(4),
      .grid-item3:nth-child(5) {
        grid-column-start: 12;
        grid-column-end: 17;
      }
      .grid-item3:nth-child(6),
      .grid-item3:nth-child(7) {
        grid-column-start: 17;
        grid-column-end: 21;
      }

      .grid-item3:nth-child(4),
      .grid-item3:nth-child(6) {
        grid-row-start: 1;
        grid-row-end: 2;
      }
      .grid-item3:nth-child(5),
      .grid-item3:nth-child(7) {
        grid-row-start: 2;
        grid-row-end: 3;
      }

      .grid-item3:nth-child(8) {
        grid-column-start: 1;
        grid-column-end: 6;
      }
      .grid-item3:nth-child(9) {
        grid-column-start: 6;
        grid-column-end: 11;
      }
      .grid-item3:nth-child(10) {
        grid-column-start: 11;
        grid-column-end: 16;
      }
      .grid-item3:nth-child(11) {
        grid-column-start: 16;
        grid-column-end: 21;
      }

      /* ----------------- */
      .grid-box6 {
        width: 600px;
        height: 200px;

        display: grid;
        grid-template-columns: 20%  1fr  20%  20%;
        grid-template-rows: 1fr  1fr;
      }
      .grid-item6 {
        border: 1px solid green;
      }
      .grid-item6:nth-child(1) {
        grid-column: 2/3;
        grid-row: 1/3;
      }
      .grid-box7 {
        width: 600px;
        height: 100px;

        display: grid;
        grid-template-columns: repeat(4, 1fr);
        grid-template-rows: repeat(1, 1fr);
      }
      .grid-item7 {
        border: 1px solid green;
      }
    </style>
  </head>
  <body>
    <div class="grid-box1">
      <div class="grid-item1">1</div>
      <div class="grid-item1">2</div>
      <div class="grid-item1">3</div>
      <div class="grid-item1">4</div>
      <div class="grid-item1">5</div>
      <div class="grid-item1">6</div>
      <div class="grid-item1">7</div>
      <div class="grid-item1">8</div>
      <div class="grid-item1">9</div>
      <div class="grid-item1">10</div>
    </div>

    <div class="grid-box2">
      <div class="grid-item2">1</div>
      <div class="grid-item2">2</div>
      <div class="grid-item2">3</div>
      <div class="grid-item2">4</div>
      <div class="grid-item2">5</div>
      <div class="grid-item2">6</div>
      <div class="grid-item2">7</div>
      <div class="grid-item2">8</div>
      <div class="grid-item2">9</div>
      <div class="grid-item2">10</div>
      <div class="grid-item2">11</div>
    </div>

    <div class="grid-box3">
      <div class="grid-item3">1</div>
      <div class="grid-item3">2</div>
      <div class="grid-item3">3</div>
      <div class="grid-item3">4</div>
      <div class="grid-item3">5</div>
      <div class="grid-item3">6</div>
      <div class="grid-item3">7</div>
      <div class="grid-item3">8</div>
      <div class="grid-item3">9</div>
      <div class="grid-item3">10</div>
      <div class="grid-item3">11</div>
    </div>

    <div class="grid-box6">
      <div class="grid-item6">1</div>
      <div class="grid-item6">2</div>
      <div class="grid-item6">3</div>
      <div class="grid-item6">4</div>
      <div class="grid-item6">5</div>
      <div class="grid-item6">6</div>
      <div class="grid-item6">7</div>
    </div>
    <div class="grid-box7">
      <div class="grid-item7">8</div>
      <div class="grid-item7">9</div>
      <div class="grid-item7">10</div>
      <div class="grid-item7">11</div>
    </div>
  </body>
</html>
