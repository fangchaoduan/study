<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>
      2.grid调整间距和容器内项目总体排列方式及项目在单个单元格之间排列方式
    </title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }

      .grid布局容器 {
        margin: 100px 0 0 100px;
        width: 500px;
        height: 600px;
        border: 1px solid red;

        display: grid;

        grid-template-columns: 100px 50px 100px;
        grid-template-rows: 200px repeat(3, 100px);
        /* grid-row-gap: 20px; */
        /* grid-column-gap: 10px; */

        /* grid-row-gap: 20px;
        grid-column-gap: 10px;
        grid-gap: 0px 0px; */

        /* grid-auto-flow: column;
        grid-auto-flow: row; */

        /* justify-items: center;
        justify-items:start;
        align-items: center;
        align-items:start;
        place-items: start start; */

        /* justify-content: center;
        align-content: center;
        place-content: start start; */
      }

      .grid布局容器 > div {
        /* width: 100px;
        height: 100px; */
        border: 1px solid red;
      }

      .grid布局项目 {
        /* grid-column-start: 1;
        grid-column-end: 3;
        grid-row-start: 1;
        grid-row-end: 4; */
        grid-column: 1/3;
        grid-row: 1/4;
      }
    </style>
  </head>
  <body>
    <span>前</span>
    <div class="grid布局容器">
      <div>1</div>
      <div>2</div>
      <div class="grid布局项目">3</div>
      <div>4</div>
      <div>5</div>
      <div>6</div>
      <div>7</div>
      <div>8</div>
      <div>9</div>
      <div>10</div>
      <div>11</div>
      <div>12</div>
    </div>
    <span>后</span>
  </body>
</html>
