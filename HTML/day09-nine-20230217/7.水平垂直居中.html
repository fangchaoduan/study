<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>水平垂直居中</title>
<style>
  .box {
    width: 400px;
    height: 300px;
    border: 1px solid rgb(255, 255, 0);
    position: relative;
  }
  .item {
    width: 100px;
    height: 200px;
    background-color: pink;

    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
  }
</style>
  </head>
  <body>
<div class="box">
  <div class="item"></div>
</div>
  </body>
</html>
