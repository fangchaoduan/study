<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>元素</title>
  <style>
    .box{
      width: 700px;
      height: 700px;
      display: flex;
      border: 1px solid blue;
    }
    .box>div{
      box-sizing: border-box;
      border: 3px solid #ff0;
    }
    .item1{
      width: 100px;
      height: 100px;
      background-color: pink;
      flex-grow: 4;/* 100+(700-(100+200+300))*(4/(4+3+3)) */
    }
    .item2{
      width: 200px;
      height: 200px;
      background-color: skyblue;
      flex-grow: 3;
    }
    .item3{
      width: 300px;
      height: 300px;
      background-color: red;
      flex-grow: 3;
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="item1">001</div>
    <div class="item2">002</div>
    <div class="item3">003</div>
  </div>
</body>
</html>
