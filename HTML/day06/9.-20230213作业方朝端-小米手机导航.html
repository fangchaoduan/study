<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>小米导航</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      a {
        text-decoration: none;
      }
      body > div {
        background-color: #333;
        margin: 0 auto;
      }

      .float-left {
        float: left;
      }
      .float-right {
        float: right;
      }

      .box {
        width: 1200px;
        margin: 0 auto;
      }

      .float-fix::after {
        content: "";

        display: block;
        width: 0px;
        clear: both;
      }

      a {
        display: inline-block;
        color: #b0b0b0;
        line-height: 40px;
        margin: 0 5px 0 0;
        font-size: 12px;
      }
      a:hover {
        color: #fff;
      }

      .login-about {
        display: inline-block;
        text-align: center;
      }
      .shopping-cart {
        display: inline-block;
      }
      .shopping-cart > span {
        display: inline-block;
        color: #b0b0b0;
        line-height: 40px;
        margin: 0 5px;
        font-size: 12px;
      }

      .shopping-block {
        display: none;
        background-color: #fff;
        width: 400px;
        height: 100px;
        text-align: center;
      }

      /* .shopping-cart > span:hover + .shopping-block {
        display: block;
      }
      .shopping-block:hover {
        display: block;
      } */

      .shopping-cart:hover > .shopping-block {
        display: block;
      }
    </style>
  </head>
  <body>
    <div>
      <div class="box float-fix">
        <div class="float-left">
          <a href="https://www.mi.com/">小米官网</a>
          <a href="https://www.mi.com/">小米商城</a>
          <a href="https://www.mi.com/">MIUI</a>
          <a href="https://www.mi.com/">IoT</a>
          <a href="https://www.mi.com/">云服务</a>
          <a href="https://www.mi.com/">有品</a>
          <a href="https://www.mi.com/">小爱开放平台</a>
          <a href="https://www.mi.com/">企业团购</a>
          <a href="https://www.mi.com/">资质证照</a>
          <a href="https://www.mi.com/">协议规则</a>
          <a href="https://www.mi.com/"> 下载app </a>
          <a href="https://www.mi.com/">Select Location</a>
        </div>
        <div class="float-right">
          <div class="login-about">
            <a href="https://www.mi.com/">登录</a>
            <a href="https://www.mi.com/">注册</a>
            <a href="https://www.mi.com/">消息通知</a>
          </div>
          <div class="shopping-cart">
            <span>购物车</span>
            <div class="shopping-block">购物车中还没有商品，赶紧选购吧！</div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
