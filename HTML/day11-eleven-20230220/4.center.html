<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      div {
        --this-height: 200px;
        width: 200px;
        height: var(--this-height);
        border: 1px solid red;

        text-align: center;
        /* transform: translate(-50%,-50%); */
        line-height: calc(var(--this-height));
      }

      .container {
        margin: 20px 0px;
        width: 100%;
        height: 100px;
        display: flex;
        align-items: center;
        background-color: pink;
      }
    </style>
  </head>
  <body>
    <div>
      <span>5555</span>
    </div>

    <div class="container">flex布局 使文字垂直居中</div>
  </body>
</html>
