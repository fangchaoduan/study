<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>placeholder提示文本伪元素</title>
    <style>
      /* 标准写法 */
      input::placeholder {
        color: red;
      }
      /* webkit的实验性写法 */
      input::-webkit-input-placeholder {
        color: blue;
      }
      input {
        caret-color: red;
      }
    </style>
  </head>
  <body>
    <input type="text" placeholder="提示文本" />
  </body>
</html>
