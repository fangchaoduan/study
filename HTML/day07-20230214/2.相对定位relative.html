<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>position定位</title>
    <style>
      body {
        background-color: skyblue;
      }
      .top-block {
        width: 200px;
        height: 200px;
        background-color: pink;
        position: relative;
        top: 50px;
        bottom: 100px;
        left: 150px;
        right: 200px;
      }

      .bottom-block {
        width: 200px;
        height: 200px;
        background-color: greenyellow;
      }
    </style>
  </head>
  <body>
    <div class="top-block">上方div块</div>
    <div class="bottom-block">下方div块</div>
  </body>
</html>
