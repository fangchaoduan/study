<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }

      body {
        background-color: skyblue;
      }

      .outer {
        width: 400px;
        height: 400px;
        background-color: pink;
        overflow: hidden;/* 解决margin穿透。 */
      }
      .inner {
        width: 100px;
        height: 100px;
        background-color: yellow;
        margin-top: 10px;
      }

      .box1 {
        width: 200px;
        height: 200px;
        background-color: aquamarine;

        margin-bottom: 40px;
      }
      .box2 {
        width: 300px;
        height: 300px;
        background-color: greenyellow;

        margin-top: 60px;
      }
    </style>
  </head>
  <body>
    <div class="outer">
      <div class="inner">
        内部设置上下margin的高度，发现并不是在子元素内部生效，而是在父元素上生效。
      </div>
    </div>

    <div class="box1">box1与box2的margin只剩下最大的一个了</div>
    <div class="box2"></div>
  </body>
</html>
