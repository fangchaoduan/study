<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>注册页</title>
</head>
<body>
  <div class="box">
    <h1>欢迎注册</h1>
    <div>
      <span1>已有帐号？</span1>
      <a href="https://www.baidu.com/">登录</a>
    </div>
    <div><label for="username">用户名</label><input type="text" id="username" name="username"></div>
    <div><label for="photo">手机号</label><input type="text" id="photo" name="photo"></div>
    <div><label for="passwordname">密码</label><input type="password" id="passwordname" name="passwordname"></div>
    <div><label for="number">验证码</label><input type="text" id="number" name="number"><input type="text"></div>
    <input type="button" value="注册">
    <div>
      <input type="">阅读并接受</input><a href="https://passport.baidu.com/static/passpc-account/html/protocal.html">《百度用户协议》</a>、<a href="https://passport.baidu.com">《百度用户协议二》</a>、<a href="https://passport.baidu.com">《百度用户协议三》</a>
    </div>
  </div>
</body>
</html>
