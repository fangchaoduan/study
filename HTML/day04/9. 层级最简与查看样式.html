<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>9. 层级最简与查看样式</title>
    <style>
      div{
        background-color: aqua;
      }
      div>div{
        width: 300px;
        height: 300px;
        border: 1px solid red;
      }
      div>div>div{
        width: 100px;
        height: 100px;
        border: 1px solid yellow;
        background-color: pink;
      }
    </style>
  </head>
  <body>
    <div>
      <div>第1项</div>
      <div>第2项</div>
      <div>
        第
        <div>内部元素</div>
        项
      </div>
      <div>第4项</div>
      <div>第5项</div>
      <div>第6项</div>
    </div>
  </body>
</html>
