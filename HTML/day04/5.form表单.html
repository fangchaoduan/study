<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>form布局</title>
  </head>
  <body>
    <form action="./0.form.html">
      <input type="text" readonly>
      <div>
        <span>input标签text普通文本输入框</span>
        <input type="text" name="textValue" value="value默认值" required/>
      </div>
      <div>
        <span>input标签password密码框</span>
        <input type="password" placeholder="提示文字" autofocus autocomplete="on" />
      </div>
      <div>
        <span>input标签radio单选框</span>
        <input type="radio" disabled/>
      </div>
      <div>
        <span>input标签checkbox多选框</span>
        <input type="checkbox" />
      </div>
      <div>
        <span>input标签reset重置按钮</span>
        <input type="reset" />
      </div>
      <div>
        <span>input标签submit提交按钮</span>
        <input type="submit" />
      </div>
      <div>
        <span>input标签button普通按钮</span>
        <input type="button" />
      </div>
      <div>
        <span>button按钮</span>
        <button>button标签</button>
      </div>
    </form>
  </body>
</html>
