<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Document</title>
    <style>
      div {
        background-color: skyblue;
      }

      span{
        display: inline-block;
        font-size: 12px;
        color: red;
      }
      .无字 {
        width: 100px;
        height: 100px;
        background-color: antiquewhite;
      }

      .单行文字 {
        width: 200px;
        height: 200px;
        background-color: blue;
        font-size: 20px;
      }
      .多行文字 {
        width: 300px;
        height: 400px;
        background-color: yellow;
        font-size: 25px;
      }
    </style>
  </head>
  <body>
    <div>
      正常文本一xy方English中文字符
      <img src="./十字对齐240X240.png" alt="十字对齐240X240" />
      <span class="无字"></span>
      <span class="单行文字">一行文字200*200</span>
      <span class="多行文字">
        多行文字300*400
        访问另一个文件，实际上就是想尽一切办法跟目标文件处于同级。层叠性:
        同一样式区，从上向下执行，属性相同，后面的会覆盖前面的。</span
      >
      正常文本最后xy方English中文字符
      <br />

      父标签第二行xy方English中文字符
      <span>一一一一</span>
      ul>li${你$好}*6 666 <br />

      父标签第三行xy方English中文字符
      <img src="./十字对齐240X240.png" alt="十字对齐240X240" />
      ul>li${你$好}*6
    </div>
  </body>
</html>
