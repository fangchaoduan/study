<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .outer {
        width: 400px;
        height: 400px;
        background-color: pink;
        /* overflow: hidden; */
      }
      .box1 {
        width: 200px;
        height: 200px;
        background-color: aquamarine;

        margin-bottom: 40px;
      }
      .box:before {
        content: "";
        overflow: hidden;
      }
      .box2 {
        width: 300px;
        height: 300px;
        background-color: greenyellow;

        margin-top: 60px;
      }
    </style>
  </head>
  <body>
    <div class="outer">
      <div class="inner"></div>
    </div>

    <div class="box1">box1与box2的margin只剩下最大的那个</div>
    <div class="box2"></div>
  </body>
</html>
