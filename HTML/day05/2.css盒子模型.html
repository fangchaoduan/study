<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>css盒子模型</title>
  <style>
    .outer{
      width: 400px;
      height: 400px;
      background-color: skyblue;
    }
    span{
      background-color: greenyellow;
    }

    .inner{
      width: 150px;
      height: 200px;
      background-color: pink;

      padding: 20px 21px 22px 23px;

      border: 10px solid yellow;
      border-width: 10px 11px 12px 13px;

      margin: 30px 31px 32px 33px;
    }

    /* .inner{
      box-sizing: border-box;
    } */

    
  .box1 {
    width: 200px;
    height: 200px;
    background-color: aquamarine;

    margin-bottom: 40px;
  }
  .box2 {
    width: 300px;
    height: 300px;
    background-color: greenyellow;

    margin-top: 60px;
  }
  </style>
</head>
<body>
  <div class="outer">
    <span>外部盒子前</span>
    <div class="inner">盒子模型文本</div>
    <span>外部盒子后</span>
  </div>

  
  <div class="box1">box1与box2的margin只剩下最大的那个</div>
  <div class="box2"></div>
</body>
</html>
