<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>注册页</title>
  <link rel="stylesheet" href="./baidu-register.css">
</head>
<body>
  <div class="box">
    <h3>欢迎注册</h3>
    <div>
      <span1>已有帐号？</span1>
      <a href="https://www.baidu.com/">登录</a>
    </div>
    <form>
      <div class="item">
        <label for="username">用户名</label>
        <input type="text" id="username" name="username" placeholder="请设置用户名">
      </div>
      <div class="item">
        <label for="photo">手机号</label>
        <input type="text" id="photo" name="photo" placeholder="可用于登录和找回密码">
      </div>
      <div class="item">
        <label for="passwordname">密码</label>
        <input type="password" id="passwordname" name="passwordname" placeholder="请设置登录密码">
      </div>
      <div class="last-item">
        <label for="number">验证码</label>
        <input type="text" id="number" name="number" class="input-code" placeholder="请输入验证码">
        <input type="button" value="获取验证码" class="get-code">
      </div>

      <input type="button" value="注册">

      <div>
        <input type="checkbox">阅读并接受</input>
        <a href="https://passport.baidu.com/static/passpc-account/html/protocal.html">《百度用户协议》</a>、
        <a href="https://passport.baidu.com">《百度用户协议二》</a>、
        <a href="https://passport.baidu.com">《百度用户协议三》</a>
      </div>
    </form>
  </div>
</body>
</html>
