<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>linear-gradient()线性渐变</title>
    <style>
      .container {
        width: 400px;
        height: 200px;
        border: 1px solid rgb(255,255,0);
        overflow: hidden;
      }

      .item{
        width: 1600px;
        height: 200px;
        background-image: repeating-linear-gradient( 45deg, #000 0px, #000 30px, #fff 30px, #fff 60px);

        animation: move 5s linear forwards infinite;
      }
      .item:hover{
        animation-play-state: paused;/* 鼠标移动到上面时暂停动画 */
      }

      @keyframes move{
        0%{
          background-position-x: 0;
        }
        100%{
          background-position-x: -1200px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="item"></div>
    </div>
  </body>
</html>
