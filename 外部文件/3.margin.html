<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>标准盒模型</title>
  <style>
    * {
      margin: 0;
      padding: 0;
    }

    div {
      width: 200px;
      height: 200px;
      background-color: pink;
      /* 上右下左 */
      margin: 20px;
      /* 上下20px  左右40px */
      margin: 20px 40px;
      /* 上20px  右左40px  下50px */
      margin: 20px 40px 50px;
      /* 上20px 右40px 下50px 左60px  */
      margin: 20px 40px 50px 60px;

      margin-top: 10px;
      margin-right: 10px;
      margin-bottom: 10px;
      margin-left: 10px;
    }
  </style>
</head>

<body>
  <div></div>
</body>

</html>
