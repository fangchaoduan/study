<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>js变量</title>
</head>

<body></body>

</html>
<script>
  // 变量 （容器）
  // ！！声明了但是没有定义，就是undefined
  // 声明+定义（赋值）
  var box; //var 是固定的一个关键字  box是变量（随便叫啥，只要遵循命名规范）
  box = 100; //赋值   将100赋值给box

  // var box = 100;//既声明右定义

  box = 200; //重新赋值

  var box1 = 100,
    box2 = 200;

  // var box1=100;
  // var box2=200;

  var box1 = box2 = 200;
  // var box1=200;
  // box2=200;
</script>
