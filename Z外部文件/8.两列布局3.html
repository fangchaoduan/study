<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>左列定宽，右列自适应</title>
  <style>
    * {
      margin: 0;
      padding: 0;
    }

    .left {
      width: 300px;
      height: 100vh;
      background-color: pink;
    }

    .right {
      height: 100vh;
      background-color: skyblue;
      flex: 1;
    }

    body {
      display: flex;
    }
  </style>
</head>

<body>
  <div class="left"></div>
  <div class="right">111</div>
</body>

</html>
