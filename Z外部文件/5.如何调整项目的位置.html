<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    * {
      margin: 0;
      padding: 0;
    }

    .wrap {
      margin: 50px 100px;
      width: 500px;
      height: 500px;
      border: 10px solid gray;
      display: grid;
      grid-template-rows: 100px 100px 100px;
      grid-template-columns: 100px 100px 100px;
      grid-gap: 20px 20px;
      /* 调整项目的位置 默认是row 项目是从左往右，一行一行排列 */
      /* grid-auto-flow: row; */
      /* 从上下往下，一列一列排列 */
      grid-auto-flow: column;
    }

    .wrap>div {
      border: 1px dashed red;
      width: 50px;
      height: 50px;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div>1</div>
    <div>2</div>
    <div>3</div>
    <div>4</div>
    <div>5</div>
    <div>6</div>
    <div>7</div>
    <div>8</div>
    <div>9</div>
  </div>
</body>

</html>
