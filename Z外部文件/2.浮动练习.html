<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .wrap {
      width: 1000px;
      overflow: hidden;
    }

    .box {
      width: 200px;
      height: 200px;
      float: left;
    }

    .box1 {
      background-color: pink;
    }

    .box2 {
      background-color: skyblue;
    }

    .box3 {
      background-color: lightcyan;
    }

    .box4 {
      background-color: lightgreen;
    }

    .box5 {
      background-color: lightsteelblue;
    }

    .box12 {
      width: 1000px;
      height: 80px;
      background-color: blueviolet;
    }

    .box6 {
      width: 300px;
      height: 300px;
      float: left;
    }

    .box7 {
      background-color: darkcyan;
    }

    .box8 {
      background-color: darkolivegreen;
    }

    .box9 {
      width: 600px;
      height: 100px;
      background-color: darkkhaki;
      float: left;
    }

    .box10 {
      width: 400px;
      height: 250px;
      background-color: chocolate;
    }

    .box11 {
      width: 400px;
      height: 150px;
      background-color: violet;
    }

    .leftWrap {
      float: left;
      width: 600px;
    }

    .rightWrap {
      float: left;
    }

    .box12 {
      float: left;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="box box1">200*200</div>
    <div class="box box2">200*200</div>
    <div class="box box3">200*200</div>
    <div class="box box4">200*200</div>
    <div class="box box5">200*200</div>
    <div class="leftWrap">
      <div class="box6 box7">300*300</div>
      <div class="box6 box8">300*300</div>
      <div class="box9">600*100</div>
    </div>
    <div class="rightWrap">
      <div class="box10">400*250</div>
      <div class="box11">400*150</div>
    </div>
    <div class="box12">1000*80</div>
  </div>
</body>

</html>
