<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <form action="index.html">
    <!-- type的各种属性值是什么意思  （7个） -->
    <!-- text:普通文本输入框 -->
    <!-- name属性写了才可以提交数据 -->
    <input type="text" name="user">
    <!-- password:密码框 -->
    <input type="password" name="pass">
    <!-- radio：单选框 -->
    <input type="radio">
    <!-- checkbox：多选 -->
    <input type="checkbox">
    <!-- reset:重置 -->
    <input type="reset">
    <!-- submit:提交 -->
    <input type="submit">
    <button>我也是按钮</button>
    <!-- button:按钮  value控制按钮上的文字，这种按钮只是长了按钮的样子，不能提交数据-->
    <input type="button" value="按钮">
  </form>
</body>

</html>
