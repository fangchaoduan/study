    var fn = (a) => { return a + 1 }
    // @1 形参只有一个

    var fn = a => { return a + 1 }
    // @2 函数里面只有一条return 语句
    // 把大括号和return省略
    var fn = a => a + 1;

    var ary = [1, 2, 3];

      }
    )
