<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=s, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <!-- 
    视频
    controls:控件（暂停/播放...）
    height
    width
    autoplay：自动播放
    muted:静音
    loop：循环
  -->
  <video src="zjm.mp4" controls width="600" autoplay muted loop></video>
  <!-- 音频  自动播放+静音无效-->
  <audio src="qingtian.mp3" controls autoplay muted loop></audio>
</body>

</html>
