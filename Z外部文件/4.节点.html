<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <div id="eleDiv">
    1111
    <!-- hahaha -->
    <p>hahaha</p>
    <a href="http://www.baidu.com" id="eleA"></a>
  </div>
  <script>
    // 节点
    /* 
    + 文档节点
    + 属性节点
    + 文本节点
    + 注释节点
    + 元素节点
    */

    // 元素节点
    console.log(eleA.nodeName);//A
    console.log(eleA.nodeType);//1
    console.log(eleA.nodeValue);//null
    console.log('----------------');

    // 属性节点  getAttributeNode 拿到属性节点
    var attrNode = eleA.getAttributeNode('href');//'href=....'
    console.log(attrNode.nodeName);//'href'
    console.log(attrNode.nodeType);//2
    console.log(attrNode.nodeValue);//'http://www.baidu.com'
    console.log('------');


    // 文本节点
    var textNode = nodeList[0];
    console.log(textNode.nodeName);//#text
    console.log(textNode.nodeType);//3
    console.log(textNode.nodeValue);// 文本内容
    console.log('---------------');


    // 注释节点  childNodes 所有子节点
    var nodeList = eleDiv.childNodes;
    var comNode = nodeList[1];
    console.log(comNode.nodeName);//#comment
    console.log(comNode.nodeType);//8
    console.log(comNode.nodeValue);//'hahaha'

    console.log('---------------');
    // 文档节点
    console.log(document);
    // 节点名称
    console.log(document.nodeName);// #document
    // 节点类型
    console.log(document.nodeType);// 9
    // 节点值
    console.log(document.nodeValue); // null

   // 子节点  子元素节点

  </script>
</body>

</html>
