<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <ul>
    <!-- 注释 -->
    <li name="user" id="eleLi">111</li>
    <li>222</li>
    <li>222</li>
    <li>222</li>
    <li>222</li>
  </ul>
  <script src="">
    // 如何获取元素？
    // @1 通过id获取
    document.getElementById('box');
    // @2 通过类名
    document.getElementsByClassName('box');
    // @3 通过标签名
    document.getElementsByTagName('div');
    // @4 通过name
    document.getElementsByName('user');
    // @5 选择器
    document.querySelector('.box');
    document.querySelectorAll('.box');
    // @6 获取html/body/head
    document.documentElement;//html
    document.body;//body
    document.head;//head

    // 如何获取一屏幕的宽高
    document.documentElement.clientWidth || document.body.clientWidth;
    document.documentElement.clientHeight || document.body.clientHeight;
  </script>
  <script src="">
    /* 
    + 元素节点
      + 节点名称  ->大写的标签名
      + 节点类型  ->1
      + 节点值    ->null
    + 属性节点
      + 节点名称  ->'属性名'
      + 节点类型  ->2
      + 节点值    ->'属性值'
    + 文本节点
      + 节点名称  ->#text
      + 节点类型  ->3
      + 节点值    ->'文本内容'
    + 注释节点
      + 节点名称  ->#comment
      + 节点类型  ->8
      + 节点值    ->'注释内容'
    + 文档节点
      + 节点名称  ->#document
      + 节点类型  ->9
      + 节点值    ->null
    */
    console.log(eleLi.getAttributeNode('name').nodeName);
    // 节点 VS 元素节点
  </script>
  <script>
    /*
    + 父节点（只可能是元素节点） parentNode
    + 子节点 childNodes
    + 子元素节点 children
    + 第一个子节点 firstChild
    + 第一个子元素节点 firstElementChild
    + 最后一个子节点  lastChild
    + 最后一个子元素节点 lastElementChild
    + 上一个兄弟节点  previousSibling
    + 上一个兄弟元素节点 previousElementSibling
    + 下一个兄弟节点 nextSibling
    + 下一个兄弟元素节点 nextElementSibling
    */
  </script>
</body>

</html>
