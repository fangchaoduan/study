<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    * {
      margin: 0;
      padding: 0;
    }

    .wrap {
      margin: 50px 100px;
      width: 500px;
      height: 500px;
      border: 10px solid gray;
      display: grid;
      grid-template-columns: 100px 100px 100px;
      grid-template-rows: 100px 100px 100px;
      /* 项目在单元中水平排列方式 */
      /* justify-items: start; */
      /* justify-items: end; */
      /* justify-items: center; */
      /* justify-items: stretch; ???*/
      /* 项目在单元中垂直排列方式  */
      align-items: start;
      align-items: end;
      align-items: center;
    }

    .wrap>div {
      width: 50px;
      height: 50px;
      border: 2px dashed red;

    }
  </style>
</head>

<body>
  <div class="wrap">
    <div>1</div>
    <div>2</div>
    <div>3</div>
    <div>4</div>
    <div>5</div>
    <div>6</div>
    <div>7</div>
    <div>8</div>
    <div>9</div>
  </div>
</body>

</html>
