<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .top {
      width: 300px;
      height: 300px;
      background-color: pink;
      /* 不脱流 */
      /* 参照物：相对自身在移动 */
      /* 一般作为绝对定位的参照物 */
      position: relative;

      /* bottom和left可以按照xy轴去记忆，另外两个相反 */

      /* 负数往上移动 */
      /* top: -100px; */
      /* 正数往下移动 */
      /* top: 100px; */
      /* bottom: 100px;
      bottom: -100px; */

      /* 正数往右移动 */
      /* left: 100px; */
      /* 负数往左移动 */
      /* left: -100px; */
      right: 100px;
      right: -100px;
    }

    .bottom {
      width: 300px;
      height: 300px;
      background-color: skyblue;
    }
  </style>
</head>

<body>
  <!-- 
  定位position：
    + 静态定位（默认值）static
    + 相对定位 relative
    + 绝对定位 absolute
    + 固定定位 fixed
 -->
  <!-- 
  + 四个方位值（top/right/bottom/left）
  + 是否脱流
  + 参照物
  -->

  <div class="top"></div>
  <div class="bottom"></div>
</body>

</html>
