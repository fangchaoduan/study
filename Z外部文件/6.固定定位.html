<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    * {
      margin: 0;
      padding: 0;
    }

    body {
      height: 3000px;
    }

    .top {
      width: 300px;
      /* width: 100%; */
      height: 300px;
      background-color: pink;
      /* 参照物是视口 */
      position: fixed;
      right: 100px;
      bottom: 100px;
    }

    .bottom {
      width: 300px;
      height: 300px;
      background-color: skyblue;
    }

    .wrap {
      width: 1000px;
      height: 700px;
      border: 10px solid lightcoral;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="top"></div>
    <div class="bottom"></div>
  </div>
</body>

</html>
