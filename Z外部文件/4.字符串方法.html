<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <script>
    var str = 'zhufengzhufeng';
    // @1 charAt 通过下标找到对应的字符
    console.log(str.charAt(0));
    console.log(str.charAt(6));
    // @2 charCodeAt 通过下标找到对应的字符对应的ASCII码
    console.log(str.charCodeAt(0));//122
    // @3 indexOf（第一次出现的位置）  第一个参数是查找的字符   第二个参数是从哪开始找的位置
    console.log(str.indexOf('z'));//0 找到就是对应的下标
    console.log(str.indexOf('x'));//-1  如果找不到就是-1
    // @4 lastIndexOf（最后一次出现的位置）  第一个参数是查找的字符  第二个参数是结束的位置
    console.log(str.lastIndexOf('g'));//13  找到就是对应的下标
    console.log(str.lastIndexOf('x'));//-1  如果找不到就是-1
    console.log('----------------------------------');
    // @5 slice
    console.log(str.slice());//不传参数，赋值整个字符串
    console.log(str.slice(2));//从下标为2开始（包含2），往后全部复制
    console.log(str.slice(2, 5));//从2到5（不包含5）  'ufe'
    console.log(str.slice(-5, -1));//9,13 'ufen' 如果是负数（倒数第几个到倒数第几个）（字符串长度加负数）
    console.log(str.slice(14, 5));//''  如果不符合规则，那就是空串

    // @6 subString和slice几乎一样，就是subString不能负数
    // @7 subStr和slice几乎一样，就是第二个参数是截取的【个数】

    // @8 toUpperCase 将字符串变大写
    console.log(str.toUpperCase());//ZHUFENGZHUFENG
    // var str = 'znsjd133';
    // console.log(str.toUpperCase());
    // @9 toLowerCase将字符串变小写
    // var str = 'ASGGHA';
    console.log(str.toLowerCase());

    // @10 replace 替换  配合正则使用
    var str2 = 'chengxiaohuiaaaaachengxiaohui';
    console.log(str2.replace('chengxiaohui', 'zhufeng').replace('chengxiaohui', 'zhufeng'));

    var ary = [1, 2, 3];
    ary.join('-');//'1-2-3'
    var str3 = '1-,23';
    console.log(str3.split('-'),'----');//['123']
    console.log(str3.split(''),);// ['1', '-', ',', '2', '3']
    











  </script>
</body>

</html>
