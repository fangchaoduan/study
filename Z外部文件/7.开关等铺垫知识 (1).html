<script>
  // 1、元素包含的常用属性：
  // ● className: 存储的是字符串，代表当前元素的类名
  // ● id：    存储的是字符串，代表当前元素的id名
  // ● innerHTML：存储当前元素的所有内容，包含标签
  // ● innerText：存储当前元素的文本内容
  // ● style：存贮当前元素的所有行内样式
  // ● onclick：点击事件属性
  // ● onmouseover：鼠标滑过事件
  // ● onmouseout：鼠标离开事件
  var ele = document.getElementById('box');
  console.dir(ele);
  console.log(ele.className);//'box'
  console.log(ele.id);
  console.log(ele.innerHTML);
  console.log(ele.innerText);
  console.log(ele.innerHTML === ele.innerText);
  // ele.innerText = '显示';

  ele.onclick = function () {
    // 点击时触发的代码
    if (ele.innerText === '隐藏') {
      ele.innerText = '显示';
    } else {
      ele.innerText = '隐藏';
    }
  }


  // 点击的时候加一个背景颜色
  ele.onclick = function () {
    ele.style.backgroundColor = 'pink';
  }

  // 鼠标移入移出事件
  ele.onmouseover = function () {
    console.log(111);
  }
  ele.onmouseout = function () {
    console.log(222);
  }
</script>
