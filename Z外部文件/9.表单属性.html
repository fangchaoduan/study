<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <form action="index.html">
    <!-- 
      + type：....
      + name:要提交数据，就得要name属性
      + value：input标签的内容
      + autofocus：自动获取光标
      + autocomplete:on/off  自动补全
      + checked:默认选中
      + disabled：禁用
      + required: 必填项
      + readonly：只读
      + placeholder：提示文字
     -->
     <input type="text" placeholder="请输入用户名">
    <input type="text" name="user" value="1111" autofocus autocomplete="off" required>
    <input type="button" value="按钮">
    <input type="password" readonly>
    男：<input type="radio" checked>
    女：<input type="radio" disabled>
    <input type="checkbox">
    <input type="reset">
    <input type="submit">
  </form>
</body>

</html>
