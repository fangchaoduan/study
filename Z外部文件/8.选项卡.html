<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    * {
      margin: 0;
      padding: 0;
    }

    .wrap {
      margin: 50px auto;
      width: 700px;
    }

    ul {
      list-style: none;
      display: flex;
    }

    li {
      width: 150px;
      height: 80px;
      text-align: center;
      line-height: 80px;
      border: 1px solid darkcyan;
      margin-right: 15px;
      font-size: 28px;
    }

    .wrap>div {
      width: 700px;
      height: 400px;
      font-size: 40px;
      text-align: center;
      line-height: 400px;
      display: none;
    }

    .wrap .current {
      display: block;
      background-color: darkcyan;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <ul>
      <li class="current">早餐</li>
      <li>午餐</li>
      <li>晚餐</li>
    </ul>
    <div class="current">早餐</div>
    <div>午餐</div>
    <div>晚餐</div>
  </div>
  <script>
    // li获取
    var liList = document.getElementsByTagName('li');
    // div获取
    var wrap = document.getElementsByClassName('wrap')[0];
    // context 上下文
    var divList = wrap.getElementsByTagName('div');

    for (var i = 0; i < liList.length; i++) {
      liList[i].index = i;
      // 循环绑定点击事件
      liList[i].onclick = function () {
        for (var j = 0; j < liList.length; j++) {
          liList[j].className = '';
          divList[j].className = '';
        }
        this.className = 'current';
        // this.index;//下标
        divList[this.index].className = 'current';
      }
    }
  </script>
</body>

</html>
